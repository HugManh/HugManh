name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-snake:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: HugManh

  actions-timeline:
    needs: [github-snake]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Kesin11/actions-timeline@v2